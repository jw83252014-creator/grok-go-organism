<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Company — Grok Go Organism</title>
<style>
  :root {
    --bg: #0a0e14;
    --card: #121826;
    --card-hover: #1a2336;
    --glow: #42f5e3;
    --text: #e8ecf1;
    --dim: #8a94a6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 24px;
    min-height: 100vh;
  }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
  .sub { color: var(--dim); font-size: 13px; margin: 4px 0 16px; }

  /* tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab {
    padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
    background: var(--card); color: var(--dim); cursor: pointer;
    border: 1px solid rgba(255,255,255,.06);
  }
  .tab.on { color: var(--glow); border-color: var(--glow); box-shadow: 0 0 12px -6px var(--glow); }
  .tab .pill {
    background: rgba(231,76,60,.2); color: #e74c3c; border-radius: 10px;
    font-size: 10px; padding: 1px 7px; margin-left: 6px;
  }
  .pane { display: none; }
  .pane.on { display: block; }

  /* roster grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .tile {
    background: var(--card); border-radius: 14px; padding: 16px 12px; text-align: center;
    cursor: pointer; border: 1px solid rgba(255,255,255,0.06);
    transition: transform .15s, border-color .15s, box-shadow .15s;
  }
  .tile:hover {
    transform: translateY(-3px); background: var(--card-hover);
    border-color: var(--tile-color, var(--glow));
    box-shadow: 0 0 18px -6px var(--tile-color, var(--glow));
  }
  .avatar {
    width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 700; color: #0a0e14;
    background: var(--tile-color); background-size: cover; background-position: center;
    border: 2px solid var(--tile-color);
  }
  .handle { font-size: 14px; font-weight: 600; }
  .role { font-size: 11px; color: var(--dim); margin-top: 3px; line-height: 1.3; }
  .badge {
    display: inline-block; font-size: 9px; padding: 2px 7px; border-radius: 8px;
    margin-top: 7px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px;
  }
  .b-active { background: rgba(46,204,113,.15); color: #2ecc71; }
  .b-warn { background: rgba(243,156,18,.15); color: #f39c12; }
  .b-down { background: rgba(231,76,60,.15); color: #e74c3c; }
  .b-new { background: rgba(66,245,227,.15); color: #42f5e3; }
  .b-human { background: rgba(245,197,66,.18); color: #f5c542; }

  /* tasks */
  .task {
    background: var(--card); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    border-left: 3px solid var(--glow); display: flex; gap: 12px; align-items: flex-start;
  }
  .task.sam { border-left-color: #42b0f5; }
  .task .prio {
    background: rgba(66,245,227,.12); color: var(--glow); border-radius: 8px;
    min-width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; flex-shrink: 0;
  }
  .task.sam .prio { background: rgba(66,176,245,.12); color: #42b0f5; }
  .task h4 { font-size: 14px; }
  .task p { font-size: 12px; color: var(--dim); margin-top: 3px; line-height: 1.45; }
  .task .from { font-size: 11px; color: var(--glow); margin-top: 5px; }
  .task input[type=checkbox] { margin-top: 4px; transform: scale(1.3); accent-color: var(--glow); }
  .task.done { opacity: .4; }
  .task.done h4 { text-decoration: line-through; }
  .who-head { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin: 18px 0 10px; }

  /* directions */
  .direction {
    background: linear-gradient(135deg, var(--card), #16213a);
    border-radius: 12px; padding: 16px; margin-bottom: 12px;
    border: 1px solid rgba(66,176,245,.25);
  }
  .direction .who { font-size: 12px; color: #42b0f5; font-weight: 700; }
  .direction .when { font-size: 10px; color: var(--dim); margin-left: 8px; }
  .direction p { font-size: 14px; line-height: 1.55; margin-top: 8px; }
  textarea {
    width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,.1);
    border-radius: 10px; color: var(--text); padding: 12px; font-size: 14px;
    font-family: inherit; resize: vertical; min-height: 70px;
  }
  .btn {
    background: var(--glow); color: #0a0e14; border: none; border-radius: 10px;
    padding: 9px 22px; font-weight: 700; font-size: 13px; cursor: pointer; margin-top: 8px;
  }
  .btn.alt { background: #42b0f5; }
  .as-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
  .as-row label { font-size: 12px; color: var(--dim); }
  select {
    background: var(--card); color: var(--text); border: 1px solid rgba(255,255,255,.1);
    border-radius: 8px; padding: 6px 10px; font-size: 13px;
  }

  /* media board */
  .media-card {
    background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 14px;
    border: 1px solid rgba(255,255,255,.06);
  }
  .media-card h4 { font-size: 15px; }
  .media-card .meta { font-size: 11px; color: var(--dim); margin-top: 4px; }
  .media-card img, .media-card video { max-width: 100%; border-radius: 10px; margin-top: 10px; }
  .media-card .placeholder {
    margin-top: 10px; border: 1px dashed rgba(255,255,255,.15); border-radius: 10px;
    padding: 22px; text-align: center; color: var(--dim); font-size: 12px;
  }
  .comments { margin-top: 12px; border-top: 1px solid rgba(255,255,255,.07); padding-top: 10px; }
  .comment { display: flex; gap: 8px; margin-bottom: 8px; font-size: 13px; }
  .comment .c-who { font-weight: 700; flex-shrink: 0; }
  .comment .c-who.jeff { color: #f5c542; }
  .comment .c-who.sam { color: #42b0f5; }
  .comment .c-text { color: var(--text); line-height: 1.4; }
  .comment .c-when { font-size: 10px; color: var(--dim); }
  .note { font-size: 11px; color: var(--dim); margin-top: 6px; }

  /* detail overlay */
  .overlay {
    position: fixed; inset: 0; background: rgba(5,8,12,.85);
    display: none; align-items: center; justify-content: center; z-index: 10;
    backdrop-filter: blur(4px);
  }
  .overlay.open { display: flex; }
  .detail {
    background: var(--card); border-radius: 18px; max-width: 420px; width: 92%;
    padding: 28px; border: 1px solid var(--detail-color, var(--glow));
    box-shadow: 0 0 40px -10px var(--detail-color, var(--glow));
    max-height: 85vh; overflow-y: auto;
  }
  .detail .avatar { width: 84px; height: 84px; font-size: 34px; }
  .detail h2 { text-align: center; font-size: 19px; }
  .detail .lane { text-align: center; color: var(--dim); font-size: 12px; margin: 4px 0 16px; }
  .section { margin-top: 14px; }
  .section h3 {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--detail-color, var(--glow)); margin-bottom: 5px;
  }
  .section p, .section li { font-size: 13px; line-height: 1.5; }
  .section ul { padding-left: 18px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 11px; padding: 3px 10px; border-radius: 10px; background: rgba(255,255,255,.07); cursor: pointer; }
  .chip:hover { background: rgba(255,255,255,.14); }
  .close { float: right; cursor: pointer; color: var(--dim); font-size: 20px; line-height: 1; }
</style>
</head>
<body>
  <h1>THE COMPANY</h1>
  <div class="sub" id="count"></div>

  <div class="tabs">
    <div class="tab on" data-pane="roster" onclick="switchTab(this)">Roster</div>
    <div class="tab" data-pane="tasks" onclick="switchTab(this)">Your Tasks <span class="pill" id="taskCount"></span></div>
    <div class="tab" data-pane="board" onclick="switchTab(this)">Board</div>
    <div class="tab" data-pane="directions" onclick="switchTab(this)">Directions</div>
  </div>

  <div class="pane on" id="pane-roster"><div class="grid" id="grid"></div></div>

  <div class="pane" id="pane-tasks" >
    <div class="who-head" style="color:#f5c542">Jeff — catch up here</div>
    <div id="tasks-jeff"></div>
    <div class="who-head" style="color:#42b0f5">Sam</div>
    <div id="tasks-sam"></div>
    <div class="note">Checking a box saves locally + posts to Agent Bridge so agents see it.</div>
  </div>

  <div class="pane" id="pane-board"></div>

  <div class="pane" id="pane-directions">
    <div id="directions-list"></div>
    <div class="as-row">
      <label>Post as</label>
      <select id="dir-as"><option value="@jeff">Jeff</option><option value="@somaco">Sam</option></select>
    </div>
    <textarea id="dir-text" placeholder="Give the company direction — agents pick this up on their next turn..."></textarea>
    <button class="btn alt" onclick="postDirection()">Post Direction</button>
    <div class="note">Directions post to Agent Bridge (127.0.0.1:8787) and save locally. Sam ran it at Lockheed, Salesforce, and FB — when he posts here, the company listens.</div>
  </div>

  <div class="overlay" id="overlay" onclick="if(event.target===this)closeCard()">
    <div class="detail" id="detail"></div>
  </div>

<script>
const BRIDGE = 'http://127.0.0.1:8787';
let MEMBERS = [], TASKS = [], DIRECTIONS = [], MEDIA = [];

const store = {
  get: k => JSON.parse(localStorage.getItem('board:' + k) || 'null'),
  set: (k, v) => localStorage.setItem('board:' + k, JSON.stringify(v))
};

function bridgeSay(text) {
  fetch(BRIDGE + '/api/say', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ from: 'board', text })
  }).catch(() => {}); // bridge may be down; local save already happened
}

function switchTab(el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('pane-' + el.dataset.pane).classList.add('on');
}

const statusBadge = s => {
  if (s === 'active') return '<span class="badge b-active">active</span>';
  if (s === 'tunnel-down' || s === 'needs-reauth') return '<span class="badge b-down">' + s + '</span>';
  return '<span class="badge b-warn">' + s + '</span>';
};

function renderRoster(data) {
  MEMBERS = data.members;
  const humans = MEMBERS.filter(m => m.type === 'human').length;
  const fresh = MEMBERS.filter(m => m.joined === data.updated).length;
  document.getElementById('count').textContent =
    `${MEMBERS.length} members — ${humans} humans, ${MEMBERS.length - humans} agents` +
    (fresh ? ` — ${fresh} new today` : '') + ` · updated ${data.updated}`;
  document.getElementById('grid').innerHTML = MEMBERS.map((m, i) => `
    <div class="tile" style="--tile-color:${m.color}" onclick="openCard(${i})">
      <div class="avatar" ${m.avatar ? `style="background-image:url('${m.avatar}');--tile-color:${m.color}"` : ''}>${m.avatar ? '' : m.name[0]}</div>
      <div class="handle">${m.handle}</div>
      <div class="role">${m.role}</div>
      ${m.type === 'human' ? '<span class="badge b-human">human</span>' : statusBadge(m.status)}
      ${m.joined ? '<span class="badge b-new">new</span>' : ''}
    </div>`).join('');
}

function renderTasks(data) {
  TASKS = data.tasks;
  DIRECTIONS = (store.get('directions') || []).concat(data.directions || []);
  const doneSet = new Set(store.get('done') || []);
  const open = TASKS.filter(t => !doneSet.has(t.id)).length;
  document.getElementById('taskCount').textContent = open;

  const renderList = (who, elId, cls) => {
    document.getElementById(elId).innerHTML = TASKS
      .filter(t => t.for === who)
      .sort((a, b) => a.priority - b.priority)
      .map(t => `
        <div class="task ${cls} ${doneSet.has(t.id) ? 'done' : ''}" id="task-${t.id}">
          <input type="checkbox" ${doneSet.has(t.id) ? 'checked' : ''} onchange="toggleTask('${t.id}', this.checked)">
          <div class="prio">${t.priority}</div>
          <div>
            <h4>${t.title}</h4>
            <p>${t.detail}</p>
            <div class="from">from ${t.from}</div>
          </div>
        </div>`).join('') || '<p class="note">Nothing pending.</p>';
  };
  renderList('@jeff', 'tasks-jeff', '');
  renderList('@somaco', 'tasks-sam', 'sam');
  renderDirections();
}

function toggleTask(id, done) {
  const doneSet = new Set(store.get('done') || []);
  done ? doneSet.add(id) : doneSet.delete(id);
  store.set('done', [...doneSet]);
  document.getElementById('task-' + id).classList.toggle('done', done);
  const t = TASKS.find(t => t.id === id);
  if (done && t) bridgeSay(`✅ ${t.for} completed: ${t.title}`);
  const open = TASKS.filter(t => !doneSet.has(t.id)).length;
  document.getElementById('taskCount').textContent = open;
}

function renderDirections() {
  document.getElementById('directions-list').innerHTML = DIRECTIONS.map(d => `
    <div class="direction">
      <span class="who">${d.from === '@somaco' ? 'SAM' : 'JEFF'}</span><span class="when">${d.date}</span>
      <p>${d.text}</p>
    </div>`).join('');
}

function postDirection() {
  const text = document.getElementById('dir-text').value.trim();
  if (!text) return;
  const from = document.getElementById('dir-as').value;
  const d = { from, date: new Date().toISOString().slice(0, 10), text };
  const local = store.get('directions') || [];
  local.unshift(d);
  store.set('directions', local);
  DIRECTIONS.unshift(d);
  document.getElementById('dir-text').value = '';
  renderDirections();
  bridgeSay(`📋 DIRECTION from ${from}: ${text}`);
}

function renderMedia(data) {
  MEDIA = data.items;
  const localComments = store.get('comments') || {};
  document.getElementById('pane-board').innerHTML = MEDIA.map(m => {
    const comments = (m.comments || []).concat(localComments[m.id] || []);
    return `
    <div class="media-card">
      <h4>${m.title}</h4>
      <div class="meta">${m.type} · by ${m.by} · ${m.status}</div>
      ${m.src
        ? (m.type === 'video'
            ? `<video src="${m.src}" controls></video>`
            : `<img src="${m.src}" alt="${m.title}">`)
        : `<div class="placeholder">No asset yet — ${m.path}</div>`}
      <div class="comments">
        ${comments.map(c => `
          <div class="comment">
            <span class="c-who ${c.who === '@somaco' ? 'sam' : 'jeff'}">${c.who === '@somaco' ? 'Sam' : 'Jeff'}</span>
            <span class="c-text">${c.text} <span class="c-when">${c.when || ''}</span></span>
          </div>`).join('')}
        <div class="as-row">
          <select id="cwho-${m.id}"><option value="@jeff">Jeff</option><option value="@somaco">Sam</option></select>
          <textarea id="ctext-${m.id}" placeholder="Comment..." style="min-height:38px;flex:1"></textarea>
          <button class="btn" onclick="addComment('${m.id}')">Post</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function addComment(mediaId) {
  const text = document.getElementById('ctext-' + mediaId).value.trim();
  if (!text) return;
  const who = document.getElementById('cwho-' + mediaId).value;
  const c = { who, text, when: new Date().toISOString().slice(0, 16).replace('T', ' ') };
  const all = store.get('comments') || {};
  (all[mediaId] = all[mediaId] || []).push(c);
  store.set('comments', all);
  const m = MEDIA.find(x => x.id === mediaId);
  bridgeSay(`💬 ${who} on "${m.title}": ${text}`);
  renderMedia({ items: MEDIA });
}

function openCard(i) {
  const m = MEMBERS[i];
  const d = document.getElementById('detail');
  d.style.setProperty('--detail-color', m.color);
  d.innerHTML = `
    <span class="close" onclick="closeCard()">✕</span>
    <div class="avatar" style="--tile-color:${m.color}" ${m.avatar ? `style="background-image:url('${m.avatar}')"` : ''}>${m.avatar ? '' : m.name[0]}</div>
    <h2>${m.name} <span style="color:var(--dim);font-weight:400">${m.handle}</span></h2>
    <div class="lane">${m.role} · ${m.lane}</div>
    <div class="section"><h3>About</h3><p>${m.about}</p></div>
    <div class="section"><h3>Projects</h3><ul>${m.projects.map(p => `<li>${p}</li>`).join('')}</ul></div>
    <div class="section"><h3>Ask me about</h3><div class="chips">${m.ask_me_about.map(a => `<span class="chip">${a}</span>`).join('')}</div></div>
    <div class="section"><h3>Connected to</h3><div class="chips">${m.connected_to.map(c => `<span class="chip" onclick="jumpTo('${c}')">${c}</span>`).join('')}</div></div>
    ${m.gyst_uuid_type ? `<div class="section"><h3>GYST UUID type</h3><p style="font-family:monospace">${m.gyst_uuid_type}</p></div>` : ''}`;
  document.getElementById('overlay').classList.add('open');
}

function jumpTo(handle) {
  const i = MEMBERS.findIndex(m => m.handle === handle);
  if (i >= 0) openCard(i);
}
function closeCard() { document.getElementById('overlay').classList.remove('open'); }

Promise.all([
  fetch('roster.json').then(r => r.json()),
  fetch('tasks.json').then(r => r.json()).catch(() => ({ tasks: [], directions: [] })),
  fetch('media.json').then(r => r.json()).catch(() => ({ items: [] }))
]).then(([roster, tasks, media]) => {
  renderRoster(roster);
  renderTasks(tasks);
  renderMedia(media);
}).catch(() => {
  document.getElementById('count').textContent =
    'Could not load roster.json — serve this folder: python3 -m http.server 8090';
});
</script>
</body>
</html>
